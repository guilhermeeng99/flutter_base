name: flutter_base
description: "FlutterBase - Interactive learning platform for Flutter."

version: 1.0.1+1

environment:
  sdk: ^3.11.0

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  font_awesome_flutter: ^11.0.0
  freezed_annotation: ^3.0.0
  go_router: ^15.1.2
  google_fonts: ^8.0.2
  json_annotation: ^4.11.0
  logger: ^2.6.2
  melos: ^7.4.0
  path: ^1.9.1
  slang: ^4.13.0
  slang_flutter: ^4.13.0
  url_launcher: ^6.3.2
  yaml_edit: ^2.2.1

dev_dependencies:
  build_runner: ^2.4.14
  flutter_test:
    sdk: flutter
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  slang_build_runner: ^4.13.0
  very_good_analysis: ^10.2.0

melos:
  scripts:
    slang:
      run: dart run slang

    generate_assets_folders:
      run: dart run my_portfolio:assets_linux

    run_release_deploy:
      run: powershell -ExecutionPolicy Bypass -File deploy_web.ps1

flutter:
  assets:
    - lib/app/assets/i18n/
    - lib/app/assets/images/
    - lib/features/challenges/data/datasources/items/chat_mockado/presentation/
  uses-material-design: true
